<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Scheila Almeida</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/svg+xml" href="../images/favicon-scheila.png">
    <base target="_blank">
<base target="_blank">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo"><span class="logo-icon">🏋️‍♀️</span><span class="logo-text">Scheila Almeida</span></a>
        </div>
    </nav>

    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="logo"><span class="logo-icon">🏋️‍♀️</span><span class="logo-text">Scheila Almeida</span></div>
                    <h1>Criar Conta</h1>
                    <p>Comece sua jornada fitness hoje</p>
                </div>

                <form id="form-cadastro">
                    <div class="form-group">
                        <label for="nome">Nome Completo</label>
                        <input type="text" id="nome" required placeholder="Seu nome completo">
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" required placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label for="telefone">WhatsApp</label>
                        <input type="tel" id="telefone" required placeholder="(00) 00000-0000">
                    </div>
                    <div class="form-group">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" required placeholder="Mínimo 6 caracteres" minlength="6">
                    </div>
                    <div class="form-group" style="display:flex;align-items:flex-start;gap:8px">
                        <input type="checkbox" id="termos" required style="width:auto;margin-top:4px">
                        <label for="termos" style="margin-bottom:0;font-size:13px">
                            Li e aceito os <a href="termos.html" target="_blank" style="color:var(--primary)">Termos de Uso</a> e 
                            <a href="politica.html" target="_blank" style="color:var(--primary)">Política de Privacidade</a>
                        </label>
                    </div>
                    <button type="submit" class="btn-submit" id="btn-cadastrar">
                        Criar Conta Grátis
                    </button>
                </form>

                <div class="auth-footer">
                    Já tem uma conta? <a href="login.html">Entrar</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8/dist/umd/supabase.min.js"></script>
    <script src="../js/config.js"></script>
    <script>
        // ============================================
        // CONFIGURAÇÃO
        // ============================================
        const SUPABASE_URL = 'https://aqrvozmxlcgrllclceke.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxcnZvem14bGNncmxsY2xjZWtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNTk0MDEsImV4cCI6MjA5MTgzNTQwMX0.6CL3-1dU6WUT4EbJ0UfvmLFj6jGPnT9Avc743WrNiCA';
        const EDGE_FUNCTION_URL = 'https://aqrvozmxlcgrllclceke.supabase.co/functions/v1/enviar-email-boas-vindas';

        let supabaseClient = null;

        document.addEventListener('DOMContentLoaded', function() {
            // Inicializar Supabase
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('[SCHEILA] Supabase inicializado');

            initCadastro();
        });

        function initCadastro() {
            document.getElementById('telefone').addEventListener('input', function(e) {
                let v = e.target.value.replace(/\D/g, '');
                v = v.replace(/^(\d{2})(\d)/g, '($1) $2');
                v = v.replace(/(\d{5})(\d)/, '$1-$2');
                e.target.value = v;
            });
            document.getElementById('form-cadastro').addEventListener('submit', handleCadastro);
        }

        // ============================================
        // ENVIAR E-MAIL DE BOAS-VINDAS VIA EDGE FUNCTION
        // ============================================
        async function enviarEmailBoasVindas(nome, email, senha) {
            try {
                console.log('[SCHEILA] Enviando e-mail de boas-vindas via Edge Function...');

                const response = await fetch(EDGE_FUNCTION_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
                    },
                    body: JSON.stringify({
                        nome: nome,
                        email: email,
                        senha: senha,
                        login_url: 'https://scheilaalmeida.com.br/pages/login.html'
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    console.error('[SCHEILA] Erro na Edge Function:', errorData);
                    return { success: false, error: errorData.error || 'Erro ao enviar e-mail' };
                }

                const result = await response.json();
                console.log('[SCHEILA] ✅ E-mail de boas-vindas enviado:', result);
                return { success: true, data: result };

            } catch (error) {
                console.error('[SCHEILA] ❌ Erro ao enviar e-mail:', error);
                return { success: false, error: error.message };
            }
        }

        async function handleCadastro(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-cadastrar');
            btn.disabled = true;
            btn.textContent = 'Criando conta...';
            showLoading('Criando sua conta...');

            try {
                const nome = document.getElementById('nome').value.trim();
                const email = document.getElementById('email').value.trim().toLowerCase();
                const telefone = document.getElementById('telefone').value.replace(/\D/g, '');
                const senha = document.getElementById('senha').value;

                console.log('[SCHEILA] Iniciando cadastro via Supabase Auth...');

                // 1. Criar usuário no Supabase Auth
                const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                    email: email,
                    password: senha,
                    options: {
                        data: {
                            nome: nome,
                            telefone: telefone
                        }
                    }
                });

                if (authError) {
                    console.error('[SCHEILA] Erro Auth:', authError);
                    throw new Error(authError.message === 'User already registered' 
                        ? 'Este e-mail já está cadastrado. Faça login.' 
                        : 'Erro ao criar conta: ' + authError.message);
                }

                if (!authData.user) {
                    throw new Error('Erro ao criar usuário. Tente novamente.');
                }

                console.log('[SCHEILA] Auth criado com sucesso. ID:', authData.user.id);

                // 2. Inserir na tabela usuarios
                const { error: insertError } = await supabaseClient
                    .from('usuarios')
                    .insert({
                        auth_id: authData.user.id,
                        nome: nome,
                        email: email,
                        telefone: telefone,
                        plano: 'teste',
                        status: 'ativo',
                        nivel_acesso: 'usuario'
                    });

                if (insertError) {
                    console.error('[SCHEILA] Erro ao inserir na tabela usuarios:', insertError);
                } else {
                    console.log('[SCHEILA] Usuário inserido na tabela usuarios com sucesso');
                }

                // 3. Login automático após cadastro
                const { data: loginData, error: loginError } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: senha
                });

                if (loginError) {
                    console.error('[SCHEILA] Erro login automático:', loginError);
                    hideLoading();
                    showToast('Conta criada!', 'Sua conta foi criada! Faça login para continuar.', 'success');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                    return;
                }

                // 4. Enviar e-mail de boas-vindas via Edge Function (não bloqueia o fluxo)
                const emailResult = await enviarEmailBoasVindas(nome, email, senha);

                if (emailResult.success) {
                    console.log('[SCHEILA] E-mail de boas-vindas enviado com sucesso!');
                } else {
                    console.warn('[SCHEILA] E-mail não enviado (não crítico):', emailResult.error);
                }

                hideLoading();
                showToast('Bem-vindo!', 'Conta criada com sucesso! Verifique seu e-mail.', 'success');

                // Redirecionar para cursos após 2 segundos
                setTimeout(() => {
                    window.location.href = 'cursos.html';
                }, 2000);

            } catch (error) {
                hideLoading();
                btn.disabled = false;
                btn.textContent = 'Criar Conta Grátis';
                console.error('[SCHEILA] Erro cadastro:', error);
                showToast('Erro', error.message || 'Erro ao criar conta. Tente novamente.', 'error');
            }
        }
    </script>
</body>
</html>
