<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Scheila Almeida</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo"><span class="logo-icon">🏋️‍♀️</span><span class="logo-text">Scheila Almeida</span></a>
        </div>
    </nav>

    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="logo"><span class="logo-icon">🏋️‍♀️</span><span class="logo-text">Scheila Almeida</span></div>
                    <h1>Criar Conta</h1>
                    <p>Comece sua jornada fitness hoje</p>
                </div>

                <form id="form-cadastro">
                    <div class="form-group">
                        <label for="nome">Nome Completo</label>
                        <input type="text" id="nome" required placeholder="Seu nome completo">
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" required placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label for="telefone">WhatsApp</label>
                        <input type="tel" id="telefone" required placeholder="(00) 00000-0000">
                    </div>
                    <div class="form-group">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" required placeholder="Mínimo 6 caracteres" minlength="6">
                    </div>
                    <div class="form-group" style="display:flex;align-items:flex-start;gap:8px">
                        <input type="checkbox" id="termos" required style="width:auto;margin-top:4px">
                        <label for="termos" style="margin-bottom:0;font-size:13px">
                            Li e aceito os <a href="termos.html" target="_blank" style="color:var(--primary)">Termos de Uso</a> e 
                            <a href="politica.html" target="_blank" style="color:var(--primary)">Política de Privacidade</a>
                        </label>
                    </div>
                    <button type="submit" class="btn-submit" id="btn-cadastrar">
                        Criar Conta Grátis
                    </button>
                </form>

                <div class="auth-footer">
                    Já tem uma conta? <a href="login.html">Entrar</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8/dist/umd/supabase.min.js"></script>
    <script src="../js/config.js"></script>
    <script>


        document.addEventListener('DOMContentLoaded', function() {
            waitForSupabase(() => {
                initCadastro();
            });
        });

        function initCadastro() {
            document.getElementById('telefone').addEventListener('input', function(e) {
                let v = e.target.value.replace(/\D/g, '');
                v = v.replace(/^(\d{2})(\d)/g, '($1) $2');
                v = v.replace(/(\d{5})(\d)/, '$1-$2');
                e.target.value = v;
            });
            document.getElementById('form-cadastro').addEventListener('submit', handleCadastro);
        }

        async function handleCadastro(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-cadastrar');
            btn.disabled = true;
            btn.textContent = 'Criando conta...';
            showLoading('Criando sua conta...');

            try {
                const nome = document.getElementById('nome').value.trim();
                const email = document.getElementById('email').value.trim().toLowerCase();
                const telefone = document.getElementById('telefone').value.replace(/\D/g, '');
                const senha = document.getElementById('senha').value;

                // USAR EDGE FUNCTION (ignora rate limits e signups disabled)
                console.log('[SCHEILA] Chamando Edge Function de cadastro...');
                const response = await fetch(`${SUPABASE_URL}/functions/v1/scheilaalmeida-cadastro`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    },
                    body: JSON.stringify({
                        nome: nome,
                        email: email,
                        telefone: telefone,
                        senha: senha
                    })
                });

                const result = await response.json();
                console.log('[SCHEILA] Resposta Edge Function:', result);

                if (!response.ok || !result.success) {
                    throw new Error(result.error || 'Erro ao criar conta');
                }

                // Login automático após cadastro
                const { data: loginData, error: loginError } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: senha
                });

                if (loginError) {
                    console.error('[SCHEILA] Erro login:', loginError);
                    hideLoading();
                    showToast('Conta criada!', 'Sua conta foi criada! Faça login para continuar.', 'success');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                    return;
                }

                hideLoading();
                showToast('Bem-vindo!', 'Conta criada com sucesso! Explore nossos cursos.', 'success');

                // Redirecionar para cursos após 2 segundos
                setTimeout(() => {
                    window.location.href = 'cursos.html';
                }, 2000);

            } catch (error) {
                hideLoading();
                btn.disabled = false;
                btn.textContent = 'Criar Conta Grátis';
                console.error('[SCHEILA] Erro cadastro:', error);
                showToast('Erro', error.message || 'Erro ao criar conta. Tente novamente.', 'error');
            }
        }
    </script>
</body>
</html>
