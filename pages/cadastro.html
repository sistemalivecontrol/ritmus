<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Ritmus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo">
                <span class="logo-icon">💪</span>
                <span class="logo-text">Ritmus</span>
            </a>
        </div>
    </nav>

    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="logo">
                        <span class="logo-icon">💪</span>
                        <span class="logo-text">Ritmus</span>
                    </div>
                    <h1>Criar Conta</h1>
                    <p>Comece sua jornada fitness hoje</p>
                </div>

                <form id="form-cadastro">
                    <div class="form-group">
                        <label for="nome">Nome Completo</label>
                        <input type="text" id="nome" required placeholder="Seu nome completo">
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" required placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label for="telefone">WhatsApp</label>
                        <input type="tel" id="telefone" required placeholder="(00) 00000-0000">
                    </div>
                    <div class="form-group">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" required placeholder="Mínimo 6 caracteres" minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="plano">Plano</label>
                        <select id="plano" required>
                            <option value="">Selecione um plano</option>
                            <option value="individual">Curso Individual - R$ 49,90</option>
                            <option value="mensal">Plano Mensal - R$ 79,90/mês</option>
                            <option value="anual">Plano Anual - R$ 599,90/ano</option>
                        </select>
                    </div>
                    <div class="form-group" id="curso-select-group" style="display:none">
                        <label for="curso_id">Curso Desejado</label>
                        <select id="curso_id">
                            <option value="">Selecione o curso</option>
                        </select>
                    </div>
                    <div class="form-group" style="display:flex;align-items:flex-start;gap:8px">
                        <input type="checkbox" id="termos" required style="width:auto;margin-top:4px">
                        <label for="termos" style="margin-bottom:0;font-size:13px">
                            Li e aceito os <a href="termos.html" target="_blank" style="color:var(--primary)">Termos de Uso</a> e 
                            <a href="politica.html" target="_blank" style="color:var(--primary)">Política de Privacidade</a>
                        </label>
                    </div>
                    <button type="submit" class="btn-submit" id="btn-cadastrar">
                        Criar Conta e Pagar
                    </button>
                </form>

                <div class="auth-footer">
                    Já tem uma conta? <a href="login.html">Entrar</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8/dist/umd/supabase.min.js"></script>
    <script src="../js/config.js"></script>
    <script>
        // CURSOS HARDCODED (funciona sem Supabase)
        const CURSOS_DISPONIVEIS = [
            { id: 'jump-fitness', titulo: 'Jump Fitness', preco: 49.90 },
            { id: 'danca-fitness', titulo: 'Dança Fitness', preco: 49.90 },
            { id: 'empina-bumbum', titulo: 'Empina Bumbum', preco: 49.90 },
            { id: 'funcional-total', titulo: 'Funcional Total', preco: 39.90 }
        ];

        document.addEventListener('DOMContentLoaded', function() {
            waitForSupabase(() => {
                initCadastro();
            });
        });

        function initCadastro() {
            const urlParams = new URLSearchParams(window.location.search);
            const planoUrl = urlParams.get('plano');

            if (planoUrl) {
                document.getElementById('plano').value = planoUrl;
                toggleCursoSelect(planoUrl);
            }

            loadCursosSelect();

            document.getElementById('telefone').addEventListener('input', function(e) {
                let v = e.target.value.replace(/\D/g, '');
                v = v.replace(/^(\d{2})(\d)/g, '($1) $2');
                v = v.replace(/(\d{5})(\d)/, '$1-$2');
                e.target.value = v;
            });

            document.getElementById('plano').addEventListener('change', function() {
                toggleCursoSelect(this.value);
            });

            document.getElementById('form-cadastro').addEventListener('submit', handleCadastro);
        }

        function toggleCursoSelect(plano) {
            const group = document.getElementById('curso-select-group');
            const select = document.getElementById('curso_id');
            if (plano === 'individual') {
                group.style.display = 'block';
                select.required = true;
            } else {
                group.style.display = 'none';
                select.required = false;
            }
        }

        async function loadCursosSelect() {
            const select = document.getElementById('curso_id');
            select.innerHTML = '<option value="">Selecione o curso</option>';

            try {
                const { data: cursos, error } = await supabaseClient
                    .from('cursos')
                    .select('id, titulo, preco')
                    .eq('ativo', true)
                    .order('ordem', { ascending: true });

                if (!error && cursos && cursos.length > 0) {
                    cursos.forEach(c => {
                        select.innerHTML += `<option value="${c.id}">${c.titulo} - R$ ${c.preco ? c.preco.toFixed(2).replace('.', ',') : '49,90'}</option>`;
                    });
                    return;
                }
            } catch (e) {}

            CURSOS_DISPONIVEIS.forEach(c => {
                select.innerHTML += `<option value="${c.id}">${c.titulo} - R$ ${c.preco.toFixed(2).replace('.', ',')}</option>`;
            });
        }

        async function handleCadastro(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-cadastrar');
            btn.disabled = true;
            btn.textContent = 'Processando...';
            showLoading('Criando sua conta...');

            try {
                const nome = document.getElementById('nome').value.trim();
                const email = document.getElementById('email').value.trim().toLowerCase();
                const telefone = document.getElementById('telefone').value.replace(/\D/g, '');
                const senha = document.getElementById('senha').value;
                const plano = document.getElementById('plano').value;
                const cursoId = document.getElementById('curso_id').value;

                // 1. Verificar se usuário já existe
                try {
                    const { data: existingUser } = await supabaseClient
                        .from('usuarios')
                        .select('email')
                        .eq('email', email)
                        .maybeSingle();

                    if (existingUser) {
                        hideLoading();
                        btn.disabled = false;
                        btn.textContent = 'Criar Conta e Pagar';
                        showToast('Atenção', 'Este e-mail já está cadastrado. Tente fazer login.', 'warning');
                        return;
                    }
                } catch (e) {}

                // 2. Criar usuário no Auth
                const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                    email: email,
                    password: senha,
                    options: { data: { nome: nome } }
                });

                if (authError) {
                    // Tratar erro 429 (Too Many Requests)
                    if (authError.message && authError.message.includes('security purposes')) {
                        hideLoading();
                        btn.disabled = false;
                        btn.textContent = 'Criar Conta e Pagar';
                        showToast('Aguarde', 'Você fez muitas tentativas. Aguarde 1 minuto e tente novamente.', 'warning');
                        return;
                    }
                    throw authError;
                }

                // 3. Inserir na tabela usuarios
                const { data: userData, error: userError } = await supabaseClient
                    .from('usuarios')
                    .insert({
                        auth_id: authData.user.id,
                        nome: nome,
                        email: email,
                        telefone: telefone,
                        plano: plano,
                        status: 'pendente'
                    })
                    .select()
                    .single();

                if (userError) throw userError;

                // 4. Criar assinatura/compra
                let valor = 0;
                let descricao = '';

                if (plano === 'individual') {
                    const cursoHardcoded = CURSOS_DISPONIVEIS.find(c => c.id === cursoId);
                    const precoCurso = cursoHardcoded ? cursoHardcoded.preco : 49.90;

                    try {
                        const { data: curso } = await supabaseClient
                            .from('cursos')
                            .select('preco, titulo')
                            .eq('id', cursoId)
                            .single();
                        valor = curso?.preco || precoCurso;
                        descricao = `Curso: ${curso?.titulo || cursoHardcoded?.titulo || 'Individual'}`;
                    } catch (e) {
                        valor = precoCurso;
                        descricao = `Curso: ${cursoHardcoded?.titulo || 'Individual'}`;
                    }

                    await supabaseClient.from('compras_cursos').insert({
                        usuario_id: userData.id,
                        curso_id: cursoId,
                        valor: valor,
                        status: 'pendente'
                    });
                } else {
                    valor = plano === 'mensal' ? 79.90 : 599.90;
                    descricao = plano === 'mensal' ? 'Plano Mensal' : 'Plano Anual';
                    const dataExp = new Date();
                    dataExp.setMonth(dataExp.getMonth() + (plano === 'anual' ? 12 : 1));

                    await supabaseClient.from('assinaturas').insert({
                        usuario_id: userData.id,
                        plano: plano,
                        valor: valor,
                        status: 'pendente',
                        data_expiracao: dataExp.toISOString()
                    });
                }

                // 5. Criar pagamento no Asaas
                try {
                    const { data: paymentData, error: paymentError } = await supabaseClient.functions.invoke('asaas-criar-cobranca', {
                        body: {
                            nome: nome,
                            email: email,
                            telefone: telefone,
                            valor: valor,
                            descricao: descricao,
                            usuario_id: userData.id,
                            plano: plano,
                            curso_id: cursoId || null
                        }
                    });

                    hideLoading();

                    if (paymentError) throw paymentError;

                    if (paymentData && paymentData.success && paymentData.payment_url) {
                        sessionStorage.setItem('ritmus_pagamento', JSON.stringify({
                            usuario_id: userData.id,
                            plano: plano,
                            curso_id: cursoId,
                            payment_id: paymentData.payment_id
                        }));

                        showToast('Sucesso!', 'Redirecionando para o pagamento...', 'success');
                        setTimeout(() => {
                            window.location.href = paymentData.payment_url;
                        }, 1500);
                    } else {
                        throw new Error('Erro ao gerar link de pagamento');
                    }
                } catch (paymentErr) {
                    hideLoading();
                    console.error('[RITMUS] Erro pagamento:', paymentErr);

                    showToast('Conta criada!', 'Sua conta foi criada! Entre em contato para ativar o pagamento.', 'warning');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                }

            } catch (error) {
                hideLoading();
                btn.disabled = false;
                btn.textContent = 'Criar Conta e Pagar';
                console.error('[RITMUS] Erro cadastro:', error);

                let msg = error.message || 'Erro ao criar conta. Tente novamente.';
                if (msg.includes('security purposes')) {
                    msg = 'Muitas tentativas. Aguarde 1 minuto e tente novamente.';
                }
                showToast('Erro', msg, 'error');
            }
        }
    </script>
</body>
</html>
