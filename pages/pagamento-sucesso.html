<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Confirmado - Scheila Almeida</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/svg+xml" href="images/favicon-scheila.png">
    <style>
        .success-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #0F0F1A 0%, #1A1A2E 100%);
        }
        .success-card {
            max-width: 500px;
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 48px;
            text-align: center;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #10B981, #059669);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 24px;
            animation: scaleIn 0.5s ease;
        }
        @keyframes scaleIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .success-card h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .success-card p {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .course-info {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 32px;
            text-align: left;
        }
        .course-info img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: var(--radius-sm);
            margin-bottom: 16px;
        }
        .course-info h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .course-info p {
            font-size: 13px;
            margin-bottom: 0;
        }
        .btn-success {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: var(--radius);
            font-family: var(--font);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: var(--transition);
            margin-bottom: 12px;
        }
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.3);
        }
        .btn-ghost-success {
            display: block;
            width: 100%;
            padding: 14px;
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-family: var(--font);
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            transition: var(--transition);
        }
        .btn-ghost-success:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .logo-img {
            display: inline-block;
            vertical-align: middle;
            transition: transform 0.3s ease;
        }
        .logo:hover .logo-img {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="success-page">
        <div class="success-card">
            <div class="success-icon">✅</div>
            <div class="status-badge">🎉 Pagamento Confirmado</div>
            <h1>Parabéns, sua compra foi aprovada!</h1>
            <p>Seu acesso ao curso foi liberado. Você pode começar a assistir às aulas agora mesmo.</p>

            <div class="course-info" id="course-info">
                <img id="curso-thumb" src="" alt="Curso">
                <h3 id="curso-titulo">Carregando...</h3>
                <p id="curso-desc">Acesso vitalício liberado</p>
            </div>

            <a href="" id="btn-assistir" class="btn-success">▶️ Assistir Aulas Agora</a>
            <a href="dashboard.html" class="btn-ghost-success">📊 Ir para Meu Painel</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8/dist/umd/supabase.min.js"></script>
    <script src="../js/config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            waitForSupabase(() => {
                initSucesso();
            });
        });

        async function initSucesso() {
            const urlParams = new URLSearchParams(window.location.search);
            const cursoId = urlParams.get('curso');
            const paymentId = urlParams.get('payment');

            if (!cursoId) {
                document.getElementById('curso-titulo').textContent = 'Curso';
                document.getElementById('curso-desc').textContent = 'Seu acesso foi liberado!';
                document.getElementById('curso-thumb').src = 'https://placehold.co/600x400/1A1A2E/FF6B35?text=Curso+Liberado';
                document.getElementById('btn-assistir').href = 'cursos.html';
                return;
            }

            try {
                const { data: curso, error } = await supabaseClient
                    .from('cursos')
                    .select('*')
                    .eq('id', cursoId)
                    .single();

                if (curso) {
                    document.getElementById('curso-titulo').textContent = curso.titulo;
                    document.getElementById('curso-desc').textContent = curso.descricao || 'Acesso vitalício liberado';
                    document.getElementById('curso-thumb').src = curso.thumbnail || 'https://placehold.co/600x400/1A1A2E/FF6B35?text=' + encodeURIComponent(curso.titulo);
                }

                document.getElementById('btn-assistir').href = 'aula.html?curso=' + cursoId;

            } catch (e) {
                console.error('[SCHEILA] Erro:', e);
            }
        }
    </script>
</body>
</html>
