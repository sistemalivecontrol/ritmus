<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula - Ritmus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo">
                <span class="logo-icon">💪</span>
                <span class="logo-text">Ritmus</span>
            </a>
            <div class="nav-links">
                <a href="dashboard.html">Meu Painel</a>
                <a href="cursos.html">Cursos</a>
                <a href="" onclick="logout();return false">Sair</a>
            </div>
            <button class="menu-toggle" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <div class="dashboard-page">
        <div class="container">
            <div class="dashboard-grid">
                <aside class="sidebar">
                    <div class="sidebar-user">
                        <div class="sidebar-avatar" id="user-avatar">👤</div>
                        <div>
                            <div class="sidebar-name" id="sidebar-name">Carregando...</div>
                            <div class="sidebar-email" id="sidebar-email">...</div>
                        </div>
                    </div>
                    <ul class="sidebar-menu">
                        <li><a href="dashboard.html"><span class="menu-icon">📊</span> Meu Painel</a></li>
                        <li><a href="cursos.html"><span class="menu-icon">🎬</span> Meus Cursos</a></li>
                        <li><a href="assinatura.html"><span class="menu-icon">💳</span> Assinatura</a></li>
                        <li><a href="" onclick="logout();return false"><span class="menu-icon">🚪</span> Sair</a></li>
                    </ul>
                </aside>

                <main class="main-content">
                    <div id="curso-header" style="margin-bottom:24px">
                        <a href="cursos.html" style="color:var(--primary);font-size:14px;text-decoration:none;font-weight:500">← Voltar aos Cursos</a>
                        <h1 id="curso-titulo" style="font-size:24px;font-weight:700;margin-top:12px">Carregando...</h1>
                        <p id="curso-desc" style="color:var(--text-muted);font-size:14px;margin-top:4px"></p>
                    </div>

                    <div class="aula-player">
                        <div class="aula-video" id="video-container">
                            <!-- YouTube iframe será inserido aqui -->
                        </div>
                        <div class="aula-info">
                            <h2 id="aula-titulo">Carregando aula...</h2>
                            <p id="aula-desc" style="color:var(--text-muted);font-size:14px;margin-top:8px"></p>
                            <div style="display:flex;gap:12px;margin-top:16px">
                                <button id="btn-anterior" class="btn-ghost" style="padding:10px 20px;font-size:13px" onclick="navegarAula(-1)">
                                    ← Aula Anterior
                                </button>
                                <button id="btn-concluir" class="btn-curso" onclick="marcarConcluida()">
                                    ✅ Marcar como Concluída
                                </button>
                                <button id="btn-proxima" class="btn-ghost" style="padding:10px 20px;font-size:13px" onclick="navegarAula(1)">
                                    Próxima Aula →
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="aula-lista" id="aula-lista">
                        <!-- Lista de aulas preenchida via JS -->
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8/dist/umd/supabase.min.js"></script>
    <script src="../js/config.js"></script>
    <script>
        let currentCurso = null;
        let currentAulas = [];
        let currentAulaIndex = 0;
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', function() {
            waitForSupabase(() => {
                initAula();
            });
        });

        async function initAula() {
            const auth = await requireAuth();
            if (!auth) return;

            currentUser = auth.user;
            document.getElementById('sidebar-name').textContent = auth.user.nome || 'Aluno';
            document.getElementById('sidebar-email').textContent = auth.user.email;
            document.getElementById('user-avatar').textContent = (auth.user.nome || 'A').charAt(0).toUpperCase();

            const urlParams = new URLSearchParams(window.location.search);
            const cursoId = urlParams.get('curso');
            const aulaId = urlParams.get('aula');

            if (!cursoId) {
                showToast('Erro', 'Curso não especificado', 'error');
                return;
            }

            // Verificar acesso
            const temAcesso = await checkCursoAccess(cursoId);
            if (!temAcesso) {
                showToast('Acesso Negado', 'Você não tem acesso a este curso.', 'error');
                setTimeout(() => window.location.href = 'cursos.html', 2000);
                return;
            }

            await loadCurso(cursoId, aulaId);
        }

        async function loadCurso(cursoId, aulaId) {
            try {
                // Carregar curso
                const { data: curso } = await supabaseClient
                    .from('cursos')
                    .select('*')
                    .eq('id', cursoId)
                    .single();

                if (!curso) throw new Error('Curso não encontrado');

                currentCurso = curso;
                document.getElementById('curso-titulo').textContent = curso.titulo;
                document.getElementById('curso-desc').textContent = curso.descricao || '';

                // Carregar aulas
                const { data: aulas } = await supabaseClient
                    .from('aulas')
                    .select('*')
                    .eq('curso_id', cursoId)
                    .eq('ativo', true)
                    .order('ordem', { ascending: true });

                currentAulas = aulas || [];

                // Buscar progresso
                const { data: progressos } = await supabaseClient
                    .from('progresso_aulas')
                    .select('aula_id, concluida')
                    .eq('usuario_id', currentUser.id);

                const progressoMap = {};
                (progressos || []).forEach(p => {
                    progressoMap[p.aula_id] = p.concluida;
                });

                // Renderizar lista
                renderAulaLista(progressoMap);

                // Selecionar aula
                if (aulaId) {
                    currentAulaIndex = currentAulas.findIndex(a => a.id === aulaId);
                } else {
                    // Encontrar primeira aula não concluída
                    currentAulaIndex = currentAulas.findIndex(a => !progressoMap[a.id]);
                    if (currentAulaIndex === -1) currentAulaIndex = 0;
                }

                if (currentAulaIndex < 0) currentAulaIndex = 0;

                loadAulaVideo(currentAulaIndex);

            } catch (e) {
                console.error('Erro:', e);
                showToast('Erro', 'Erro ao carregar curso', 'error');
            }
        }

        function renderAulaLista(progressoMap) {
            const lista = document.getElementById('aula-lista');

            lista.innerHTML = currentAulas.map((aula, index) => {
                const concluida = progressoMap[aula.id];
                const isActive = index === currentAulaIndex;

                return `
                    <div class="aula-item ${isActive ? 'active' : ''} ${concluida ? 'completed' : ''}" 
                         onclick="selecionarAula(${index})">
                        <div class="aula-numero">${concluida ? '✓' : (index + 1)}</div>
                        <div>
                            <div class="aula-titulo">${aula.titulo}</div>
                            <div style="font-size:12px;color:var(--text-dark);margin-top:2px">${aula.duracao || '0:00'}</div>
                        </div>
                        <div class="aula-duracao">${concluida ? '✅ Concluída' : ''}</div>
                    </div>
                `;
            }).join('');
        }

        function loadAulaVideo(index) {
            if (index < 0 || index >= currentAulas.length) return;

            currentAulaIndex = index;
            const aula = currentAulas[index];

            // Atualizar título
            document.getElementById('aula-titulo').textContent = `Aula ${index + 1}: ${aula.titulo}`;
            document.getElementById('aula-desc').textContent = aula.descricao || '';

            // Carregar vídeo do YouTube (não listado/privado)
            // O vídeo só pode ser embedado se estiver como "não listado" e com embed ativado
            const videoContainer = document.getElementById('video-container');

            if (aula.video_url) {
                // Extrair ID do YouTube
                let videoId = aula.video_url;
                if (videoId.includes('youtube.com/watch?v=')) {
                    videoId = videoId.split('v=')[1].split('&')[0];
                } else if (videoId.includes('youtu.be/')) {
                    videoId = videoId.split('youtu.be/')[1].split('?')[0];
                } else if (videoId.includes('youtube.com/embed/')) {
                    videoId = videoId.split('embed/')[1].split('?')[0];
                }

                videoContainer.innerHTML = `
                    <iframe 
                        src="https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1&playsinline=1&enablejsapi=1" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen
                        title="${aula.titulo}"
                    ></iframe>
                `;
            } else {
                videoContainer.innerHTML = `
                    <div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted)">
                        <div style="text-align:center">
                            <div style="font-size:48px;margin-bottom:16px">🎬</div>
                            <p>Vídeo em breve</p>
                        </div>
                    </div>
                `;
            }

            // Atualizar botões
            document.getElementById('btn-anterior').disabled = index === 0;
            document.getElementById('btn-anterior').style.opacity = index === 0 ? '0.5' : '1';
            document.getElementById('btn-proxima').disabled = index === currentAulas.length - 1;
            document.getElementById('btn-proxima').style.opacity = index === currentAulas.length - 1 ? '0.5' : '1';

            // Atualizar lista
            document.querySelectorAll('.aula-item').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });

            // Scroll para a aula ativa
            const activeItem = document.querySelector('.aula-item.active');
            if (activeItem) {
                activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            // Registrar visualização
            registrarProgresso(aula.id, false);
        }

        function selecionarAula(index) {
            loadAulaVideo(index);
            // Atualizar URL sem recarregar
            const url = new URL(window.location);
            url.searchParams.set('aula', currentAulas[index].id);
            window.history.replaceState({}, '', url);
        }

        function navegarAula(direcao) {
            const novoIndex = currentAulaIndex + direcao;
            if (novoIndex >= 0 && novoIndex < currentAulas.length) {
                selecionarAula(novoIndex);
            }
        }

        async function marcarConcluida() {
            const aula = currentAulas[currentAulaIndex];
            if (!aula) return;

            try {
                await registrarProgresso(aula.id, true);
                showToast('Parabéns!', 'Aula marcada como concluída! 🎉', 'success');

                // Atualizar UI
                const items = document.querySelectorAll('.aula-item');
                const item = items[currentAulaIndex];
                item.classList.add('completed');
                item.querySelector('.aula-numero').textContent = '✓';
                item.querySelector('.aula-duracao').textContent = '✅ Concluída';

                // Avançar automaticamente após 2 segundos
                if (currentAulaIndex < currentAulas.length - 1) {
                    setTimeout(() => navegarAula(1), 2000);
                }

            } catch (e) {
                console.error('Erro:', e);
                showToast('Erro', 'Erro ao marcar aula', 'error');
            }
        }

        async function registrarProgresso(aulaId, concluida) {
            try {
                // Upsert progresso
                const { data: existing } = await supabaseClient
                    .from('progresso_aulas')
                    .select('id')
                    .eq('usuario_id', currentUser.id)
                    .eq('aula_id', aulaId)
                    .maybeSingle();

                if (existing) {
                    await supabaseClient
                        .from('progresso_aulas')
                        .update({ concluida, updated_at: new Date().toISOString() })
                        .eq('id', existing.id);
                } else {
                    await supabaseClient
                        .from('progresso_aulas')
                        .insert({
                            usuario_id: currentUser.id,
                            aula_id: aulaId,
                            curso_id: currentCurso.id,
                            concluida
                        });
                }
            } catch (e) {
                console.error('Erro progresso:', e);
            }
        }
    </script>
</body>
</html>
