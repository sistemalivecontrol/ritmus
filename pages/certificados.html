<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Certificados - Scheila Almeida</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/svg+xml" href="../images/favicon-scheila.png">
    <style>
        /* ===== CERTIFICADOS PAGE STYLES ===== */
        .cert-section {
            margin-bottom: 40px;
        }

        .cert-section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cert-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        .cert-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: var(--transition);
            position: relative;
        }

        .cert-card:hover {
            transform: translateY(-6px);
            border-color: rgba(255, 107, 53, 0.3);
            box-shadow: var(--shadow-lg);
        }

        .cert-card.locked {
            opacity: 0.7;
        }

        .cert-card.locked:hover {
            transform: none;
            border-color: var(--border);
            box-shadow: none;
            cursor: not-allowed;
        }

        .cert-header {
            padding: 24px 24px 0;
            display: flex;
            align-items: flex-start;
            gap: 16px;
        }

        .cert-badge {
            width: 56px;
            height: 56px;
            border-radius: var(--radius);
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
        }

        .cert-badge.locked {
            background: linear-gradient(135deg, var(--bg-input) 0%, var(--text-dark) 100%);
            box-shadow: none;
            opacity: 0.5;
        }

        .cert-info {
            flex: 1;
        }

        .cert-info h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .cert-info p {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .cert-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 8px;
        }

        .cert-status.completed {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .cert-status.in-progress {
            background: rgba(247, 201, 72, 0.15);
            color: var(--accent);
            border: 1px solid rgba(247, 201, 72, 0.3);
        }

        .cert-status.locked {
            background: rgba(107, 107, 123, 0.15);
            color: var(--text-dark);
            border: 1px solid rgba(107, 107, 123, 0.3);
        }

        .cert-body {
            padding: 16px 24px 0;
        }

        .cert-progress-area {
            margin-bottom: 16px;
        }

        .cert-progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .cert-progress-text {
            font-size: 13px;
            color: var(--text-muted);
        }

        .cert-progress-text strong {
            color: var(--text);
            font-weight: 600;
        }

        .cert-progress-bar {
            height: 8px;
            background: var(--bg-input);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .cert-progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.6s ease;
            position: relative;
        }

        .cert-progress-fill.completed {
            background: linear-gradient(90deg, var(--success), #059669);
        }

        .cert-progress-fill.in-progress {
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        .cert-progress-fill.locked {
            background: var(--text-dark);
        }

        .cert-footer {
            padding: 16px 24px 24px;
            display: flex;
            gap: 10px;
        }

        .cert-btn {
            flex: 1;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-family: var(--font);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            text-align: center;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .cert-btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
        }

        .cert-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.4);
        }

        .cert-btn-secondary {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .cert-btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .cert-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .cert-empty {
            text-align: center;
            padding: 60px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
        }

        .cert-empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .cert-empty h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .cert-empty p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 20px;
        }

        /* ===== CERTIFICADO VISUAL EM TELA ===== */
        .cert-viewer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }

        .cert-viewer-overlay.active {
            display: flex;
        }

        .cert-viewer-container {
            position: relative;
            max-width: 900px;
            width: 100%;
            animation: certFadeIn 0.4s ease;
        }

        @keyframes certFadeIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .cert-viewer-close {
            position: absolute;
            top: -50px;
            right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            z-index: 10;
        }

        .cert-viewer-close:hover {
            background: var(--danger);
            border-color: var(--danger);
            transform: rotate(90deg);
        }

        .cert-viewer-actions {
            position: absolute;
            top: -50px;
            left: 0;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .cert-viewer-btn {
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-family: var(--font);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .cert-viewer-btn-download {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
        }

        .cert-viewer-btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.4);
        }

        .cert-viewer-btn-share {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
        }

        .cert-viewer-btn-share:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* ===== CERTIFICADO FÍSICO ===== */
        .certificado-fisico {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            border: 3px solid;
            border-image: linear-gradient(135deg, #FF6B35, #F7C948, #FF6B35) 1;
            border-radius: var(--radius-lg);
            padding: 60px 50px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .certificado-fisico::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 107, 53, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(247, 201, 72, 0.06) 0%, transparent 50%);
            pointer-events: none;
        }

        .certificado-fisico::after {
            content: '';
            position: absolute;
            inset: 15px;
            border: 1px solid rgba(255, 107, 53, 0.2);
            border-radius: calc(var(--radius-lg) - 10px);
            pointer-events: none;
        }

        .cert-header-visual {
            position: relative;
            z-index: 1;
            margin-bottom: 30px;
        }

        .cert-logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .cert-logo-icon {
            font-size: 48px;
        }

        .cert-logo-text {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .cert-titulo-principal {
            font-size: 36px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .cert-subtitulo {
            font-size: 16px;
            color: var(--accent);
            font-weight: 500;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
        }

        .cert-divider {
            width: 120px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), var(--accent), transparent);
            margin: 24px auto;
            position: relative;
            z-index: 1;
        }

        .cert-texto-concedemos {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }

        .cert-nome-aluno {
            font-size: 32px;
            font-weight: 700;
            color: var(--text);
            margin: 16px 0;
            padding: 12px 24px;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
            position: relative;
            z-index: 1;
        }

        .cert-texto-completou {
            font-size: 15px;
            color: var(--text-muted);
            margin: 16px 0;
            line-height: 1.6;
            position: relative;
            z-index: 1;
        }

        .cert-nome-curso {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
            margin: 12px 0;
            position: relative;
            z-index: 1;
        }

        .cert-detalhes {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 24px 0;
            position: relative;
            z-index: 1;
        }

        .cert-detalhe-item {
            text-align: center;
        }

        .cert-detalhe-label {
            font-size: 11px;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .cert-detalhe-valor {
            font-size: 15px;
            color: var(--text);
            font-weight: 600;
        }

        .cert-footer-visual {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 107, 53, 0.2);
            position: relative;
            z-index: 1;
        }

        .cert-assinatura-area {
            text-align: center;
        }

        .cert-assinatura-linha {
            width: 160px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--text-muted), transparent);
            margin: 0 auto 8px;
        }

        .cert-assinatura-nome {
            font-size: 14px;
            color: var(--text);
            font-weight: 600;
        }

        .cert-assinatura-cargo {
            font-size: 11px;
            color: var(--text-dark);
        }

        .cert-selo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 4px 20px rgba(255, 107, 53, 0.4);
            position: relative;
            z-index: 1;
        }

        .cert-assinatura-img-container {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 4px;
        }

        .cert-assinatura-img {
            max-height: 45px;
            max-width: 160px;
            object-fit: contain;
            filter: brightness(1.1);
        }

        .cert-assinatura-svg {
            width: 160px;
            height: 50px;
        }

        .cert-selo-digital {
            margin-bottom: 4px;
        }

        .cert-codigo {
            font-size: 11px;
            color: var(--text-dark);
            margin-top: 16px;
            font-family: monospace;
            position: relative;
            z-index: 1;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 88px;
            right: 24px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 300px;
            max-width: 400px;
            animation: slideIn 0.3s ease;
        }

        .toast.success { border-left: 3px solid var(--success); }
        .toast.error { border-left: 3px solid var(--danger); }
        .toast.warning { border-left: 3px solid var(--warning); }

        .toast-icon { font-size: 20px; }
        .toast-content { flex: 1; }
        .toast-title { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
        .toast-message { font-size: 13px; color: var(--text-muted); }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .cert-grid {
                grid-template-columns: 1fr;
            }
            .cert-footer {
                flex-direction: column;
            }
            .certificado-fisico {
                padding: 40px 24px;
            }
            .cert-titulo-principal {
                font-size: 24px;
            }
            .cert-nome-aluno {
                font-size: 22px;
            }
            .cert-detalhes {
                flex-direction: column;
                gap: 16px;
            }
            .cert-footer-visual {
                flex-direction: column;
                gap: 24px;
                align-items: center;
            }
            .cert-viewer-actions {
                position: static;
                margin-bottom: 16px;
                justify-content: center;
            }
            .cert-viewer-close {
                top: 10px;
                right: 10px;
                background: rgba(15, 15, 26, 0.9);
            }
        }
    </style>

<body>

        <div class="nav-container">

                <span class="logo-icon">🏋️‍♀️</span>

        <div class="container">
            <div class="dashboard-header">
                <h1>🏆 Meus Certificados</h1>
                <p>Visualize e baixe seus certificados de conclusão</p>
            </div>

            <div class="dashboard-grid">
                <aside class="sidebar">
                    <div class="sidebar-user">
                        <div class="sidebar-avatar" id="user-avatar">👤</div>
                        <div>
                            <div class="sidebar-name" id="sidebar-name">Carregando...</div>
                            <div class="sidebar-email" id="sidebar-email">...</div>
                        </div>
                    </div>
                    <ul class="sidebar-menu">
                        <li><a href="dashboard.html"><span class="menu-icon">📊</span> Meu Painel</a></li>
                        <li><a href="cursos.html"><span class="menu-icon">🎬</span> Meus Cursos</a></li>
                        <li><a href="certificados.html" class="active"><span class="menu-icon">🏆</span> Certificados</a></li>
                        <li><a href="#" onclick="logout();return false"><span class="menu-icon">🚪</span> Sair</a></li>

                <main class="main-content" id="main-content">

    <!-- VISUALIZADOR DE CERTIFICADO EM TELA -->
    <div class="cert-viewer-overlay" id="cert-viewer-overlay">
        <div class="cert-viewer-container">
            <div class="cert-viewer-actions">
                <button class="cert-viewer-btn cert-viewer-btn-download" onclick="downloadCertificadoPDF()">
                    📥 Baixar PDF
                </button>
                <button class="cert-viewer-btn cert-viewer-btn-share" onclick="shareCertificado()">
                    🔗 Compartilhar
                </button>
            </div>
            <button class="cert-viewer-close" onclick="closeCertViewer()">✕</button>
            <div id="certificado-content">
                <!-- Certificado inserido via JS -->
            </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8/dist/umd/supabase.min.js"></script>
    <script src="../js/config.js"></script>
    <script>
        let currentUser = null;
        let currentCertificado = null;

        document.addEventListener('DOMContentLoaded', function() {
            waitForSupabase(() => {
                initCertificados();
            });
        });

        async function initCertificados() {
            const auth = await checkAuth();
            if (auth) {
                currentUser = auth.user;
                document.getElementById('sidebar-name').textContent = auth.user.nome || 'Aluno';
                document.getElementById('sidebar-email').textContent = auth.user.email;
                document.getElementById('user-avatar').textContent = (auth.user.nome || 'A').charAt(0).toUpperCase();
            } else {
                document.getElementById('sidebar-name').textContent = 'Visitante';
                document.getElementById('sidebar-email').textContent = 'Faça login para mais recursos';
                document.getElementById('user-avatar').textContent = '👤';
            }

            await loadCertificados();
        }

        async function loadCertificados() {
            const container = document.getElementById('main-content');

            if (!currentUser) {
                container.innerHTML = `
                    <div class="cert-empty">
                        <div class="cert-empty-icon">🔒</div>
                        <h3>Faça Login</h3>
                        <p>Entre na sua conta para visualizar seus certificados.</p>
                        <a href="../index.html" class="btn-curso">Entrar</a>
                    </div>
                `;
                return;
            }

            try {
                // Buscar todos os cursos do usuário (comprados + gratuitos)
                let cursos = [];

                // Cursos comprados
                try {
                    const { data: compras } = await supabaseClient
                        .from('compras_cursos')
                        .select('curso_id')
                        .eq('usuario_id', currentUser.id)
                        .eq('status', 'pago');

                    if (compras && compras.length > 0) {
                        const cursoIds = compras.map(c => c.curso_id);
                        const { data: cursosData } = await supabaseClient
                            .from('cursos')
                            .select('*')
                            .in('id', cursoIds)
                            .eq('ativo', true);
                        cursos = cursosData || [];
                    }
                } catch (e) {
                    console.log('[CERTIFICADOS] Erro ao buscar cursos comprados:', e.message);
                }

                // Cursos gratuitos
                try {
                    const { data: cursosFree } = await supabaseClient
                        .from('cursos')
                        .select('*')
                        .eq('ativo', true)
                        .eq('gratuito', true);

                    if (cursosFree && cursosFree.length > 0) {
                        const existingIds = cursos.map(c => c.id);
                        cursosFree.forEach(cf => {
                            if (!existingIds.includes(cf.id)) {
                                cursos.push(cf);
                            }
                        });
                    }
                } catch (e) {
                    console.log('[CERTIFICADOS] Erro ao buscar cursos gratuitos:', e.message);
                }

                if (cursos.length === 0) {
                    container.innerHTML = `
                        <div class="cert-empty">
                            <div class="cert-empty-icon">📚</div>
                            <h3>Nenhum Curso Encontrado</h3>
                            <p>Você ainda não possui cursos. Explore nossa lista e comece a treinar!</p>
                            <a href="cursos.html" class="btn-curso">Ver Cursos</a>
                        </div>
                    `;
                    return;
                }

                // Buscar progresso do usuário
                let progressoMap = {};
                let aulasPorCurso = {};

                try {
                    const { data: progressos } = await supabaseClient
                        .from('progresso_aulas')
                        .select('aula_id, concluida, updated_at')
                        .eq('usuario_id', currentUser.id)
                        .eq('concluida', true);

                    (progressos || []).forEach(p => {
                        progressoMap[p.aula_id] = p;
                    });
                } catch (e) {
                    console.log('[CERTIFICADOS] Erro ao buscar progresso:', e.message);
                }

                // Buscar aulas por curso
                try {
                    const { data: aulas } = await supabaseClient
                        .from('aulas')
                        .select('id, curso_id, ativo, ordem')
                        .eq('ativo', true)
                        .order('ordem', { ascending: true });

                    (aulas || []).forEach(a => {
                        if (!aulasPorCurso[a.curso_id]) aulasPorCurso[a.curso_id] = [];
                        aulasPorCurso[a.curso_id].push(a);
                    });
                } catch (e) {
                    console.log('[CERTIFICADOS] Erro ao buscar aulas:', e.message);
                }

                // Calcular status de cada curso
                const cursosComStatus = cursos.map(curso => {
                    const todasAulas = aulasPorCurso[curso.id] || [];
                    const totalAulas = todasAulas.length || curso.total_aulas || 0;
                    const aulasConcluidas = todasAulas.filter(aula => progressoMap[aula.id]).length;
                    const percentual = totalAulas > 0 ? Math.round((aulasConcluidas / totalAulas) * 100) : 0;
                    const concluido = percentual >= 100 && totalAulas > 0;
                    const emAndamento = percentual > 0 && percentual < 100;

                    // Encontrar data da última aula concluída
                    let dataConclusao = null;
                    if (concluido) {
                        const ultimaAula = todasAulas[totalAulas - 1];
                        if (ultimaAula && progressoMap[ultimaAula.id]) {
                            dataConclusao = progressoMap[ultimaAula.id].updated_at;
                        }
                    }

                    return {
                        ...curso,
                        totalAulas,
                        aulasConcluidas,
                        percentual,
                        concluido,
                        emAndamento,
                        dataConclusao,
                        cargaHoraria: curso.duracao_total || '8h'
                    };
                });

                const concluidos = cursosComStatus.filter(c => c.concluido);
                const emAndamento = cursosComStatus.filter(c => c.emAndamento);
                const bloqueados = cursosComStatus.filter(c => !c.concluido && !c.emAndamento);

                let html = '';

                // Seção: Concluídos (com botão VER CERTIFICADO)
                if (concluidos.length > 0) {
                    html += `
                        <div class="cert-section">
                            <h2 class="cert-section-title">✅ Concluídos</h2>
                            <div class="cert-grid">
                                ${concluidos.map(curso => renderCertCard(curso, 'completed')).join('')}
                            </div>
                        </div>
                    `;
                }

                // Seção: Em Andamento
                if (emAndamento.length > 0) {
                    html += `
                        <div class="cert-section">
                            <h2 class="cert-section-title">📚 Em Andamento</h2>
                            <div class="cert-grid">
                                ${emAndamento.map(curso => renderCertCard(curso, 'in-progress')).join('')}
                            </div>
                        </div>
                    `;
                }

                // Seção: Bloqueados (0%)
                if (bloqueados.length > 0) {
                    html += `
                        <div class="cert-section">
                            <h2 class="cert-section-title">🔒 Não Iniciados</h2>
                            <div class="cert-grid">
                                ${bloqueados.map(curso => renderCertCard(curso, 'locked')).join('')}
                            </div>
                        </div>
                    `;
                }

                container.innerHTML = html;

            } catch (e) {
                console.error('[CERTIFICADOS] Erro:', e);
                container.innerHTML = `
                    <div class="cert-empty">
                        <div class="cert-empty-icon">⚠️</div>
                        <h3>Erro ao Carregar</h3>
                        <p>Não foi possível carregar seus certificados. Tente novamente.</p>
                        <button onclick="location.reload()" class="btn-curso">🔄 Recarregar</button>
                    </div>
                `;
            }
        }

        function renderCertCard(curso, status) {
            const isCompleted = status === 'completed';
            const isInProgress = status === 'in-progress';
            const isLocked = status === 'locked';

            const badgeIcon = isCompleted ? '🏆' : (isInProgress ? '📖' : '🔒');
            const statusText = isCompleted ? 'Concluído' : (isInProgress ? 'Em Andamento' : 'Não Iniciado');
            const statusClass = status;

            // Botão primário: VER CERTIFICADO para concluídos, CONTINUAR para em andamento
            const btnPrimaryText = isCompleted ? '🏆 Ver Certificado' : (isInProgress ? '▶️ Continuar Curso' : '🔓 Iniciar Curso');
            const btnPrimaryAction = isCompleted 
                ? `onclick="visualizarCertificado('${curso.id}', '${encodeURIComponent(curso.titulo)}', '${encodeURIComponent(curso.cargaHoraria)}', '${curso.dataConclusao || ''}')"` 
                : `onclick="location.href='aula.html?curso=${curso.id}'"`;

            return `
                <div class="cert-card ${isLocked ? 'locked' : ''}">
                    <div class="cert-header">
                        <div class="cert-badge ${isLocked ? 'locked' : ''}">
                            ${badgeIcon}
                        </div>
                        <div class="cert-info">
                            <h3>${curso.titulo}</h3>
                            <p>${curso.descricao || 'Curso completo com aulas gravadas.'}</p>
                            <span class="cert-status ${statusClass}">
                                ${isCompleted ? '✅' : (isInProgress ? '⏳' : '🔒')} ${statusText}
                            </span>
                        </div>
                    </div>

                    <div class="cert-body">
                        <div class="cert-progress-area">
                            <div class="cert-progress-header">
                                <span class="cert-progress-text">
                                    <strong>${curso.percentual}%</strong> concluído 
                                    <span style="color:var(--text-dark)">(${curso.aulasConcluidas}/${curso.totalAulas} aulas)</span>
                                </span>
                            </div>
                            <div class="cert-progress-bar">
                                <div class="cert-progress-fill ${statusClass}" style="width:${curso.percentual}%"></div>
                            </div>
                        </div>
                    </div>

                    <div class="cert-footer">
                        <button class="cert-btn cert-btn-primary" ${btnPrimaryAction} ${isLocked ? 'disabled' : ''}>
                            ${btnPrimaryText}
                        </button>
                        ${!isLocked ? `
                            <a href="aula.html?curso=${curso.id}" class="cert-btn cert-btn-secondary">
                                📺 Aulas
                            </a>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        // ===== VISUALIZAR CERTIFICADO EM TELA =====

                        <h1 class="cert-titulo-principal">Certificado</h1>
                        <p class="cert-subtitulo">de Conclusão</p>
                        <div class="cert-divider"></div>
                    </div>

                    <p class="cert-texto-concedemos">
                        Concedemos este certificado a
                    </p>

                    <div class="cert-nome-aluno">${nomeAluno}</div>

                    <p class="cert-texto-completou">
                        por ter completado com sucesso o curso online de
                    </p>

                    <div class="cert-nome-curso">${titulo}</div>

                    <div class="cert-detalhes">
                        <div class="cert-detalhe-item">

                        <div class="cert-detalhe-item">

                    <div class="cert-footer-visual">

                                    <svg viewBox="0 0 200 60" class="cert-assinatura-svg">

                                              stroke="#FF6B35" stroke-width="2" fill="none" stroke-linecap="round"/>
                                        <path d="M15,50 Q35,15 55,40 T95,35 Q115,25 135,40 T175,30 Q190,25 195,35" 
                                              stroke="#F7C948" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
                                    </svg>
                                </div>
                            </div>
                            <div class="cert-assinatura-linha"></div>
                            <div class="cert-assinatura-nome">Scheila Almeida</div>
                            <div class="cert-assinatura-cargo">Instrutora e Fundadora</div>
                        </div>

                        <div class="cert-selo">🏆</div>

                        <div class="cert-assinatura-area">
                            <div class="cert-selo-digital">
                                <svg viewBox="0 0 80 80" width="60" height="60">
                                    <circle cx="40" cy="40" r="38" fill="none" stroke="url(#seloGrad)" stroke-width="2"/>
                                    <defs>
                                        <linearGradient id="seloGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                            <stop offset="0%" style="stop-color:#FF6B35"/>
                                            <stop offset="100%" style="stop-color:#F7C948"/>
                                        </linearGradient>
                                    </defs>
                                    <text x="40" y="35" text-anchor="middle" fill="#FF6B35" font-size="10" font-weight="bold">VALIDADO</text>
                                    <text x="40" y="50" text-anchor="middle" fill="#F7C948" font-size="8">DIGITAL</text>
                                </svg>
                            </div>
                            <div class="cert-assinatura-linha"></div>
                            <div class="cert-assinatura-nome">Certificado Digital</div>
                            <div class="cert-assinatura-cargo">Validação Online</div>
                        </div>
                    </div>

                    <div class="cert-codigo">Código de Validação: ${codigoCert}</div>
                </div>
            `;

            document.getElementById('certificado-content').innerHTML = certificadoHTML;
            document.getElementById('cert-viewer-overlay').classList.add('active');
            document.body.style.overflow = 'hidden';

            showToast('Certificado Pronto!', 'Visualize seu certificado de conclusão.', 'success');
        }

        function closeCertViewer() {
            document.getElementById('cert-viewer-overlay').classList.remove('active');
            document.body.style.overflow = '';
            currentCertificado = null;
        }

        // Fechar ao clicar fora
        document.getElementById('cert-viewer-overlay').addEventListener('click', function(e) {
            if (e.target === this) {
                closeCertViewer();
            }
        });

        // Fechar com ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeCertViewer();
            }
        });

        // ===== BAIXAR CERTIFICADO COMO PDF =====
        async function downloadCertificadoPDF() {

            try {

                // Por enquanto, usamos a API de impressão do navegador
                const certElement = document.getElementById('certificado-pdf');

                // Criar uma janela de impressão otimizada
                const printWindow = window.open('', '_blank');

        // ===== COMPARTILHAR CERTIFICADO =====
        async function shareCertificado() {
            if (!currentCertificado) return;

            const texto = `🏆 Acabei de concluir o curso "${currentCertificado.titulo}" com Scheila Almeida!

Certificado válido: ${currentCertificado.codigoCert}

#ScheilaAlmeida #Certificado #Fitness`;

            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Meu Certificado - Scheila Almeida',
                        text: texto,
                        url: window.location.href
                    });
                    showToast('Compartilhado!', 'Certificado compartilhado com sucesso!', 'success');
                } catch (e) {
                    // Usuário cancelou
                }
            } else {
                // Fallback: copiar para clipboard
                try {
                    await navigator.clipboard.writeText(texto);
                    showToast('Copiado!', 'Texto do certificado copiado para a área de transferência.', 'success');
                } catch (e) {
                    showToast('Erro', 'Não foi possível copiar. Tente manualmente.', 'error');
                }
            }
        }

        function showToast(title, message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;

            const icon = type === 'success' ? '✅' : (type === 'error' ? '❌' : (type === 'warning' ? '⚠️' : 'ℹ️'));

            toast.innerHTML = `
                <span class="toast-icon">${icon}</span>
                <div class="toast-content">
                    <div class="toast-title">${title}</div>
                    <div class="toast-message">${message}</div>
                </div>
            `;

            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideOut 0.3s ease forwards';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }
    </script>
