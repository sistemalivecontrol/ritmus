<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos - Scheila Almeida</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo"><img src="../images/logo-scheila-horizontal.png" alt="Scheila Almeida Cursos Fitness" class="logo-img" style="height:38px;max-width:200px;object-fit:contain"></a>
            <div class="nav-links">
                <a href="dashboard.html">Meu Painel</a>
                <a href="cursos.html" class="active">Cursos</a>
                <a href="" onclick="logout();return false">Sair</a>
            </div>
            <button class="menu-toggle" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <div class="dashboard-page">
        <div class="container">
            <div class="dashboard-header">
                <h1>🎬 Todos os Cursos</h1>
                <p>Explore nossos cursos e comece a treinar</p>
            </div>

            <div class="dashboard-grid">
                <aside class="sidebar">
                    <div class="sidebar-user">
                        <div class="sidebar-avatar" id="user-avatar">👤</div>
                        <div>
                            <div class="sidebar-name" id="sidebar-name">Carregando...</div>
                            <div class="sidebar-email" id="sidebar-email">...</div>
                        </div>
                    </div>
                    <ul class="sidebar-menu">
                        <li><a href="dashboard.html"><span class="menu-icon">📊</span> Meu Painel</a></li>
                        <li><a href="cursos.html" class="active"><span class="menu-icon">🎬</span> Meus Cursos</a></li>
                        <li><a href="" onclick="logout();return false"><span class="menu-icon">🚪</span> Sair</a></li>
                    </ul>
                </aside>

                <main class="main-content">
                    <div id="cursos-container">
                        <!-- Cursos preenchidos via JS -->
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8/dist/umd/supabase.min.js"></script>
    <script src="../js/config.js"></script>
    <script>
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', function() {
            waitForSupabase(() => {
                initCursos();
            });
        });

        async function initCursos() {
            const auth = await checkAuth();
            if (auth) {
                currentUser = auth.user;
                document.getElementById('sidebar-name').textContent = auth.user.nome || 'Aluno';
                document.getElementById('sidebar-email').textContent = auth.user.email;
                document.getElementById('user-avatar').textContent = (auth.user.nome || 'A').charAt(0).toUpperCase();
            } else {
                document.getElementById('sidebar-name').textContent = 'Visitante';
                document.getElementById('sidebar-email').textContent = 'Faça login para mais recursos';
                document.getElementById('user-avatar').textContent = '👤';
            }

            await loadCursosPage();
        }

        async function loadCursosPage() {
            const container = document.getElementById('cursos-container');

            try {
                // Verificar assinatura (se logado)
                let assinatura = { ativa: false };
                if (currentUser) {
                    assinatura = await checkAssinaturaStatus();
                }

                // Buscar todos os cursos
                const { data: cursos, error } = await supabaseClient
                    .from('cursos')
                    .select('id, titulo, descricao, thumbnail, preco, total_aulas, duracao_total, total_alunos, avaliacao, ordem, ativo, gratuito, created_at')
                    .eq('ativo', true)
                    .order('ordem', { ascending: true });

                if (error) throw error;

                if (!cursos || cursos.length === 0) {
                    container.innerHTML = `
                        <div style="text-align:center;padding:60px 20px">
                            <div style="font-size:48px;margin-bottom:16px">🎬</div>
                            <h3 style="font-size:18px;margin-bottom:8px">Nenhum curso disponível</h3>
                            <p style="color:var(--text-muted)">Volte em breve para novidades!</p>
                        </div>
                    `;
                    return;
                }

                // Buscar cursos comprados (se logado)
                let cursosComprados = [];
                if (currentUser && !assinatura.ativa) {
                    const { data: compras } = await supabaseClient
                        .from('compras_cursos')
                        .select('curso_id')
                        .eq('usuario_id', currentUser.id)
                        .eq('status', 'pago');
                    cursosComprados = (compras || []).map(c => c.curso_id);
                }

                // Buscar aulas gratuitas por curso
                const { data: aulasFree } = await supabaseClient
                    .from('aulas')
                    .select('curso_id')
                    .eq('gratuito', true)
                    .eq('ativo', true);

                const aulasFreeMap = {};
                (aulasFree || []).forEach(a => {
                    aulasFreeMap[a.curso_id] = true;
                });

                // Buscar progresso (se logado)
                let progressoMap = {};
                if (currentUser) {
                    const { data: progressos } = await supabaseClient
                        .from('progresso_aulas')
                        .select('aula_id, concluida')
                        .eq('usuario_id', currentUser.id);

                    (progressos || []).forEach(p => {
                        progressoMap[p.aula_id] = p.concluida;
                    });
                }

                // Renderizar cursos
                container.innerHTML = `
                    <div class="cursos-grid" style="grid-template-columns:repeat(auto-fill,minmax(300px,1fr))">
                        ${cursos.map(curso => {
                            // VERIFICAÇÃO DE ACESSO
                            const temAcesso = assinatura.ativa || cursosComprados.includes(curso.id);
                            const temAulasFree = aulasFreeMap[curso.id] || false;

                            // VERIFICAR SE CURSO É GRATUITO (robusto para diferentes formatos)
                            let isCursoFree = false;
                            if (curso.gratuito === true || curso.gratuito === 'true' || curso.gratuito === 't' || curso.gratuito === 1 || curso.gratuito === '1') {
                                isCursoFree = true;
                            }

                            // Se preço é 0, também considerar gratuito
                            if (curso.preco === 0 || curso.preco === '0' || curso.preco === '0.00') {
                                isCursoFree = true;
                            }

                            const podeAssistir = temAcesso || temAulasFree || isCursoFree;

                            // DEBUG: mostrar no console
                            console.log('[SCHEILA] Curso:', curso.titulo, '| gratuito:', curso.gratuito, '| preco:', curso.preco, '| isCursoFree:', isCursoFree, '| podeAssistir:', podeAssistir);

                            return `
                                <div class="curso-card" style="cursor:${podeAssistir ? 'pointer' : 'default'}">
                                    <div class="curso-thumb" style="position:relative">
                                        <img src="${curso.thumbnail || 'https://placehold.co/600x400/1A1A2E/FF6B35?text=' + encodeURIComponent(curso.titulo)}" alt="${curso.titulo}" loading="lazy">
                                        ${podeAssistir ? `
                                            <div class="curso-play">
                                                <div class="play-btn">▶</div>
                                            </div>
                                        ` : `
                                            <div style="position:absolute;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center">
                                                <div style="text-align:center">
                                                    <div style="font-size:32px;margin-bottom:8px">🔒</div>
                                                    <div style="font-size:13px;color:white;font-weight:600">Bloqueado</div>
                                                </div>
                                            </div>
                                        `}
                                        ${isCursoFree ? `
                                            <div style="position:absolute;top:12px;right:12px;background:linear-gradient(135deg,#F7C948,#D97706);color:white;padding:4px 12px;border-radius:50px;font-size:11px;font-weight:600">🎁 CURSO GRATUITO</div>
                                        ` : (temAulasFree ? `
                                            <div style="position:absolute;top:12px;right:12px;background:linear-gradient(135deg,var(--success),#059669);color:white;padding:4px 12px;border-radius:50px;font-size:11px;font-weight:600">🎁 TEM AULAS FREE</div>
                                        ` : '')}
                                        <div class="curso-badge">${curso.total_aulas || 0} aulas</div>
                                    </div>
                                    <div class="curso-info">
                                        <h3>${curso.titulo}</h3>
                                        <p>${curso.descricao || 'Curso completo com aulas gravadas.'}</p>
                                        <div class="curso-meta">
                                            <span>⏱️ ${curso.duracao_total || '0h'}</span>
                                            <span>👥 ${curso.total_alunos || 0} alunos</span>
                                        </div>
                                        ${podeAssistir ? `
                                            <div style="margin-top:16px">
                                                <a href="aula.html?curso=${curso.id}" class="btn-curso" style="display:block;text-align:center">
                                                    ${isCursoFree ? '🎁 Curso Gratuito' : (temAulasFree && !temAcesso ? '🎁 Assistir Aulas Free' : '▶️ Assistir Aulas')}
                                                </a>
                                            </div>
                                        ` : `
                                            <div class="curso-footer" style="margin-top:12px">
                                                <span class="curso-price">R$ ${curso.preco ? parseFloat(curso.preco).toFixed(2).replace('.', ',') : '49,90'}</span>
                                                <a href="pagamento.html?curso=${curso.id}" class="btn-curso">Comprar</a>
                                            </div>
                                        `}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;

            } catch (e) {
                console.error('Erro:', e);
                container.innerHTML = '<p style="color:var(--text-muted);text-align:center">Erro ao carregar cursos.</p>';
            }
        }
    </script>
</body>
</html>
