<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Cursos - Scheila Almeida</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/svg+xml" href="../images/favicon-scheila.png">
    <style>
        .btn-refresh {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255, 107, 53, 0.1);
            border: 1px solid rgba(255, 107, 53, 0.3);
            color: var(--primary);
            border-radius: var(--radius-sm);
            font-family: var(--font);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 20px;
        }
        .btn-refresh:hover {
            background: rgba(255, 107, 53, 0.2);
            transform: translateY(-1px);
        }
        .btn-refresh.spinning svg {
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .pending-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #F7C948, #D97706);
            color: white;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .pending-badge svg {
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .pending-info {
            background: rgba(247, 201, 72, 0.1);
            border: 1px solid rgba(247, 201, 72, 0.3);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
            text-align: center;
        }
        .btn-continue-payment {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #F7C948, #D97706);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-family: var(--font);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
            text-decoration: none;
            margin-top: 8px;
        }
        .btn-continue-payment:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(247, 201, 72, 0.3);
        }
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            padding: 16px 24px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            animation: slideIn 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            max-width: 400px;
        }
        .toast-success { background: linear-gradient(135deg, #10B981, #059669); color: white; }
        .toast-warning { background: linear-gradient(135deg, #F7C948, #D97706); color: white; }
        .toast-error { background: linear-gradient(135deg, #EF4444, #DC2626); color: white; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
    </style>

</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo">
                <span class="logo-icon">🏋️‍♀️</span>
                <span class="logo-text">Scheila Almeida</span>
            </a>
            <div class="nav-links">
                <a href="dashboard.html">Meu Painel</a>
                <a href="cursos.html" class="active">Cursos</a>
                <a href="#" onclick="logout();return false">Sair</a>
            </div>
            <button class="menu-toggle" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <div class="dashboard-page">
        <div class="container">
            <div class="dashboard-header">
                <h1>🎬 Todos os Cursos</h1>
                <p>Explore nossos cursos e comece a treinar</p>
            </div>

            <div class="dashboard-grid">
                <aside class="sidebar">
                    <div class="sidebar-user">
                        <div class="sidebar-avatar" id="user-avatar">👤</div>
                        <div>
                            <div class="sidebar-name" id="sidebar-name">Carregando...</div>
                            <div class="sidebar-email" id="sidebar-email">...</div>
                        </div>
                    </div>
                    <ul class="sidebar-menu">
                        <li><a href="dashboard.html"><span class="menu-icon">📊</span> Meu Painel</a></li>
                        <li><a href="cursos.html" class="active"><span class="menu-icon">🎬</span> Meus Cursos</a></li>
                        <li><a href="#" onclick="logout();return false"><span class="menu-icon">🚪</span> Sair</a></li>
                    </ul>
                </aside>

                <main class="main-content">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px">
                        <button class="btn-refresh" id="btn-refresh" onclick="refreshCursos()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="23 4 23 10 17 10"></polyline>
                                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                            </svg>
                            Atualizar Cursos
                        </button>
                        <div id="last-update" style="font-size:12px;color:var(--text-muted)"></div>
                    </div>
                    <div id="cursos-container">
                        <!-- Cursos preenchidos via JS -->
                    </div>
                </main>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8/dist/umd/supabase.min.js"></script>
    <script src="../js/config.js"></script>
    <script>
        let currentUser = null;
        let currentAuthId = null;
        let cursosCache = [];
        let comprasCache = [];
        let realtimeChannel = null;
        let autoRefreshInterval = null;

        document.addEventListener('DOMContentLoaded', function() {
            waitForSupabase(() => {
                initCursos();
            });
        });

        async function initCursos() {
            const auth = await checkAuth();
            if (auth) {
                currentUser = auth.user;
                currentAuthId = auth.user.id;
                document.getElementById('sidebar-name').textContent = auth.user.nome || 'Aluno';
                document.getElementById('sidebar-email').textContent = auth.user.email;
                document.getElementById('user-avatar').textContent = (auth.user.nome || 'A').charAt(0).toUpperCase();

                iniciarRealtime();
                iniciarAutoRefresh();
            } else {
                document.getElementById('sidebar-name').textContent = 'Visitante';
                document.getElementById('sidebar-email').textContent = 'Faça login para mais recursos';
                document.getElementById('user-avatar').textContent = '👤';
            }

            await loadCursosPage();
        }

        function iniciarRealtime() {
            if (!currentAuthId || !supabaseClient) return;

            realtimeChannel = supabaseClient
                .channel('compras_changes_' + currentAuthId)
                .on('postgres_changes', 
                    { 
                        event: '*', 
                        schema: 'public', 
                        table: 'compras_cursos',
                        filter: 'usuario_id=eq.' + currentAuthId
                    }, 
                    (payload) => {
                        console.log('[REALTIME] Mudança detectada:', payload);

                        if (payload.new && payload.new.status === 'pago' && payload.old && payload.old.status === 'pendente') {
                            showToast('Pagamento Confirmado!', 'Seu curso foi liberado! Atualizando...', 'success');
                            setTimeout(() => loadCursosPage(), 1000);
                        }
                    }
                )
                .subscribe((status) => {
                    console.log('[REALTIME] Status:', status);
                });
        }

        function iniciarAutoRefresh() {
            autoRefreshInterval = setInterval(async () => {
                if (!currentAuthId) return;

                const hasPending = comprasCache.some(c => c.status === 'pendente');
                if (hasPending) {
                    console.log('[AUTO] Compras pendentes detectadas, verificando...');
                    await loadCursosPage();
                }
            }, 10000);
        }

        async function refreshCursos() {
            const btn = document.getElementById('btn-refresh');
            btn.classList.add('spinning');
            btn.disabled = true;

            await loadCursosPage();

            btn.classList.remove('spinning');
            btn.disabled = false;
            showToast('Atualizado!', 'Lista de cursos atualizada.', 'success');
        }

        async function loadCursosPage() {
            const container = document.getElementById('cursos-container');

            try {
                const { data: cursos, error } = await supabaseClient
                    .from('cursos')
                    .select('id, titulo, descricao, thumbnail, preco, total_aulas, duracao_total, total_alunos, avaliacao, ordem, ativo, gratuito, created_at')
                    .eq('ativo', true)
                    .order('ordem', { ascending: true });

                if (error) throw error;

                cursosCache = cursos || [];
                console.log('[CURSOS] Total cursos:', cursosCache.length);

                if (cursosCache.length === 0) {
                    container.innerHTML = `
                        <div style="text-align:center;padding:60px 20px">
                            <div style="font-size:48px;margin-bottom:16px">🎬</div>
                            <h3 style="font-size:18px;margin-bottom:8px">Nenhum curso disponível</h3>
                            <p style="color:var(--text-muted)">Volte em breve para novidades!</p>
                        </div>
                    `;
                    return;
                }

                comprasCache = [];
                if (currentAuthId) {
                    console.log('[CURSOS] Buscando compras para auth_id:', currentAuthId);

                    const { data: compras, error: comprasError } = await supabaseClient
                        .from('compras_cursos')
                        .select('curso_id, status, asaas_invoice_url, asaas_payment_id')
                        .eq('usuario_id', currentAuthId)
                        .in('status', ['pago', 'pendente']);

                    if (comprasError) {
                        console.error('[CURSOS] Erro ao buscar compras:', comprasError);
                    } else {
                        comprasCache = compras || [];
                        console.log('[CURSOS] Compras encontradas:', comprasCache.length);
                        comprasCache.forEach((c, i) => {
                            console.log(`[CURSOS] Compra ${i}: curso=${c.curso_id}, status=${c.status}, invoice_url=${c.asaas_invoice_url || 'VAZIO'}, payment_id=${c.asaas_payment_id || 'VAZIO'}`);
                        });
                    }
                }

                const { data: aulasFree } = await supabaseClient
                    .from('aulas')
                    .select('curso_id')
                    .eq('gratuito', true)
                    .eq('ativo', true);

                const aulasFreeMap = {};
                (aulasFree || []).forEach(a => {
                    aulasFreeMap[a.curso_id] = true;
                });

                renderCursos(aulasFreeMap);

                document.getElementById('last-update').textContent = 'Última atualização: ' + new Date().toLocaleTimeString('pt-BR');

            } catch (e) {
                console.error('[CURSOS] Erro:', e);
                container.innerHTML = '<p style="color:var(--text-muted);text-align:center">Erro ao carregar cursos.</p>';
            }
        }

        function renderCursos(aulasFreeMap) {
            const container = document.getElementById('cursos-container');

            container.innerHTML = `
                <div class="cursos-grid" style="grid-template-columns:repeat(auto-fill,minmax(300px,1fr))">
                    ${cursosCache.map(curso => {
                        const compra = comprasCache.find(c => c.curso_id === curso.id);
                        const temAcessoCompra = !!compra && compra.status === 'pago';
                        const compraStatus = compra?.status || '';
                        const asaasInvoiceUrl = compra?.asaas_invoice_url || '';
                        const asaasPaymentId = compra?.asaas_payment_id || '';
                        const temAulasFree = aulasFreeMap[curso.id] || false;

                        console.log(`[RENDER] Curso: ${curso.titulo} | status: ${compraStatus} | invoice_url: ${asaasInvoiceUrl || 'VAZIO'} | temAcesso: ${temAcessoCompra}`);

                        let isCursoFree = false;
                        if (curso.gratuito === true || curso.gratuito === 'true' || curso.gratuito === 't' || curso.gratuito === 1 || curso.gratuito === '1') {
                            isCursoFree = true;
                        }
                        if (curso.preco === 0 || curso.preco === '0' || curso.preco === '0.00') {
                            isCursoFree = true;
                        }

                        const podeAssistir = temAcessoCompra || temAulasFree || isCursoFree;
                        const isPending = compraStatus === 'pendente';

                        // Construir URL de pagamento: preferir invoice_url, senão usar payment_id
                        let paymentUrl = asaasInvoiceUrl;
                        if (!paymentUrl && asaasPaymentId) {
                            paymentUrl = `https://sandbox.asaas.com/i/${asaasPaymentId}`;
                        }
                        const hasPaymentUrl = !!paymentUrl;

                        console.log(`[RENDER] Curso: ${curso.titulo} | isPending: ${isPending} | hasPaymentUrl: ${hasPaymentUrl} | url: ${paymentUrl || 'nenhuma'}`);

                        return `
                            <div class="curso-card" style="cursor:${podeAssistir ? 'pointer' : 'default'}">
                                <div class="curso-thumb" style="position:relative">
                                    <img src="${curso.thumbnail || 'https://placehold.co/600x400/1A1A2E/FF6B35?text=' + encodeURIComponent(curso.titulo)}" 
                                         alt="${curso.titulo}" 
                                         loading="lazy"
                                         onerror="this.src='https://placehold.co/600x400/1A1A2E/FF6B35?text=' + encodeURIComponent('${curso.titulo}')">
                                    ${podeAssistir ? `
                                        <div class="curso-play">
                                            <div class="play-btn">▶</div>
                                        </div>
                                    ` : `
                                        <div style="position:absolute;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center">
                                            <div style="text-align:center">
                                                <div style="font-size:32px;margin-bottom:8px">🔒</div>
                                                <div style="font-size:13px;color:white;font-weight:600">Bloqueado</div>
                                            </div>
                                        </div>
                                    `}
                                    ${isCursoFree ? `
                                        <div style="position:absolute;top:12px;right:12px;background:linear-gradient(135deg,#F7C948,#D97706);color:white;padding:4px 12px;border-radius:50px;font-size:11px;font-weight:600">🎁 CURSO GRATUITO</div>
                                    ` : (temAulasFree ? `
                                        <div style="position:absolute;top:12px;right:12px;background:linear-gradient(135deg,var(--success),#059669);color:white;padding:4px 12px;border-radius:50px;font-size:11px;font-weight:600">🎁 TEM AULAS FREE</div>
                                    ` : '')}
                                    <div class="curso-badge">${curso.total_aulas || 0} aulas</div>
                                </div>
                                <div class="curso-info">
                                    <h3>${curso.titulo}</h3>
                                    <p>${curso.descricao || 'Curso completo com aulas gravadas.'}</p>
                                    <div class="curso-meta">
                                        <span>⏱️ ${curso.duracao_total || '0h'}</span>
                                        <span>👥 ${curso.total_alunos || 0} alunos</span>
                                    </div>
                                    ${podeAssistir ? `
                                        <div style="margin-top:16px">
                                            <a href="aula.html?curso=${curso.id}" class="btn-curso" style="display:block;text-align:center" target="_self">
                                                ${isCursoFree ? '🎁 Curso Gratuito' : (temAulasFree && !temAcessoCompra ? '🎁 Assistir Aulas Free' : '▶️ Assistir Aulas')}
                                            </a>
                                        </div>
                                    ` : `
                                        <div style="margin-top:16px">
                                            ${isPending ? `
                                                <div class="pending-badge">
                                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                        <circle cx="12" cy="12" r="10"></circle>
                                                        <polyline points="12 6 12 12 16 14"></polyline>
                                                    </svg>
                                                    Aguardando Pagamento
                                                </div>
                                                ${hasPaymentUrl ? `
                                                    <a href="${paymentUrl}" target="_blank" class="btn-continue-payment">
                                                        💳 Continuar Pagamento
                                                    </a>
                                                ` : `
                                                    <button class="btn-continue-payment" onclick="location.reload()">
                                                        🔄 Verificar Status
                                                    </button>
                                                `}
                                                <div class="pending-info">
                                                    ⏳ Seu pagamento está pendente. ${hasPaymentUrl ? 'Clique acima para continuar e pagar.' : 'Aguarde a confirmação ou recarregue a página.'}
                                                </div>
                                            ` : `
                                                <div class="curso-footer" style="margin-top:12px">
                                                    <span class="curso-price">R$ ${curso.preco ? parseFloat(curso.preco).toFixed(2).replace('.', ',') : '49,90'}</span>
                                                    <a href="pagamento.html?curso=${curso.id}" class="btn-curso" target="_self">Comprar</a>
                                                </div>
                                            `}
                                        </div>
                                    `}
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function showToast(title, message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<strong>${title}</strong><br>${message}`;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideOut 0.3s ease forwards';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        window.addEventListener('beforeunload', () => {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            if (realtimeChannel) realtimeChannel.unsubscribe();
        });
    </script>
</body>
</html>
