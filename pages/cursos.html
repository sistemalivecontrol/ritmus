<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos - Scheila Almeida</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/svg+xml" href="../images/favicon-scheila.png">
<base target="_blank">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo"><span class="logo-icon">🏋️‍♀️</span><span class="logo-text">Scheila Almeida</span></a>
            <div class="nav-links">
                <a href="dashboard.html">Meu Painel</a>
                <a href="cursos.html" class="active">Cursos</a>
                <a href="admin.html" id="nav-admin" style="display:none">⚙️ Admin</a>
                <a href="#" onclick="logout();return false">Sair</a>
            </div>
            <button class="menu-toggle" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <div class="cursos-page">
        <div class="container">
            <div class="cursos-header">
                <h1>🎬 Nossos Cursos</h1>
                <p>Escolha seu curso e comece a treinar hoje mesmo!</p>
            </div>

            <div id="cursos-grid" class="cursos-grid">
                <!-- Preenchido via JS -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8/dist/umd/supabase.min.js"></script>
    <script src="../js/config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            waitForSupabase(() => {
                initCursos();
            });
        });

        async function initCursos() {
            const grid = document.getElementById('cursos-grid');
            grid.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px">Carregando cursos...</p>';

            try {
                const { data: cursos, error } = await supabaseClient
                    .from('cursos')
                    .select('*')
                    .eq('ativo', true)
                    .order('ordem');

                if (error) {
                    console.error('[SCHEILA] Erro ao buscar cursos:', error);
                    grid.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px">Erro ao carregar cursos. Tente novamente.</p>';
                    return;
                }

                if (!cursos || cursos.length === 0) {
                    grid.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px">Nenhum curso disponível no momento.</p>';
                    return;
                }

                // Verificar quais cursos o usuário já comprou
                let compras = [];
                try {
                    const auth = await requireAuth();
                    if (auth && auth.user) {
                        const { data: comprasData } = await supabaseClient
                            .from('compras_cursos')
                            .select('curso_id, status')
                            .eq('usuario_id', auth.user.id)
                            .eq('status', 'pago');
                        compras = comprasData || [];
                    }
                } catch (e) {
                    console.log('[SCHEILA] Usuário não logado ou erro ao buscar compras:', e.message);
                }

                const cursosComprados = compras.map(c => c.curso_id);

                grid.innerHTML = cursos.map(curso => {
                    const jaComprou = cursosComprados.includes(curso.id);
                    const isGratuito = curso.gratuito === true;
                    const preco = curso.preco || 0;
                    const precoFormatado = preco.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

                    let btnText = '';
                    let btnClass = '';
                    let btnHref = '';
                    let btnOnclick = '';

                    if (jaComprou) {
                        btnText = '▶ Assistir';
                        btnClass = 'btn-curso';
                        btnHref = `aula.html?curso=${curso.id}`;
                    } else if (isGratuito) {
                        btnText = '🎁 Acessar Grátis';
                        btnClass = 'btn-curso btn-gratuito';
                        btnHref = `aula.html?curso=${curso.id}`;
                    } else {
                        btnText = `💳 Comprar ${precoFormatado}`;
                        btnClass = 'btn-curso btn-comprar';
                        btnOnclick = `comprarCurso('${curso.id}', ${preco}, '${curso.titulo.replace(/'/g, "\'")}');return false`;
                    }

                    return `
                        <div class="curso-card">
                            <div class="curso-thumb">
                                <img src="${curso.thumbnail || 'https://placehold.co/600x400/1A1A2E/FF6B35?text=' + encodeURIComponent(curso.titulo)}" 
                                     alt="${curso.titulo}" 
                                     loading="lazy"
                                     onerror="this.src='https://placehold.co/600x400/1A1A2E/FF6B35?text=' + encodeURIComponent('${curso.titulo}')">
                                ${isGratuito ? '<span class="badge-gratuito">GRÁTIS</span>' : ''}
                                ${jaComprou ? '<span class="badge-comprado">✅ ADQUIRIDO</span>' : ''}
                            </div>
                            <div class="curso-info">
                                <h3>${curso.titulo}</h3>
                                <p style="font-size:13px;color:var(--text-muted);margin-bottom:8px">${curso.descricao || ''}</p>
                                <div class="curso-meta">
                                    <span>📚 ${curso.total_aulas || 0} aulas</span>
                                    <span>⏱️ ${curso.duracao_total || '0h'}</span>
                                </div>
                                <div class="curso-preco">
                                    ${isGratuito ? '<span class="preco-gratuito">GRATUITO</span>' : `<span class="preco">${precoFormatado}</span>`}
                                </div>
                                ${btnOnclick 
                                    ? `<a href="#" class="${btnClass}" onclick="${btnOnclick}">${btnText}</a>`
                                    : `<a href="${btnHref}" class="${btnClass}">${btnText}</a>`
                                }
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (e) {
                console.error('[SCHEILA] Erro ao carregar cursos:', e);
                grid.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px">Erro ao carregar cursos. Tente novamente.</p>';
            }
        }

        async function comprarCurso(cursoId, preco, titulo) {
            try {
                const auth = await requireAuth();
                if (!auth || !auth.user) {
                    alert('Faça login para comprar este curso!');
                    window.location.href = 'login.html';
                    return;
                }

                // Verificar se já comprou
                const { data: compraExistente } = await supabaseClient
                    .from('compras_cursos')
                    .select('*')
                    .eq('usuario_id', auth.user.id)
                    .eq('curso_id', cursoId)
                    .eq('status', 'pago')
                    .maybeSingle();

                if (compraExistente) {
                    alert('Você já comprou este curso!');
                    window.location.href = `aula.html?curso=${cursoId}`;
                    return;
                }

                // Redirecionar para página de pagamento
                window.location.href = `pagamento.html?curso=${cursoId}&valor=${preco}&titulo=${encodeURIComponent(titulo)}`;

            } catch (e) {
                console.error('[SCHEILA] Erro ao comprar curso:', e);
                alert('Erro ao processar compra. Tente novamente.');
            }
        }
    </script>

    <!-- PROTEÇÃO: Garantir que TODOS os links internos abram na mesma aba -->
    <script>
    (function() {
        function removeAllBlankTargets() {
            var links = document.querySelectorAll('a');
            links.forEach(function(link) {
                var href = link.getAttribute('href') || '';
                if (link.getAttribute('target') === '_blank') {
                    link.removeAttribute('target');
                }
                if (href && !href.startsWith('http') && !href.startsWith('//') && !href.startsWith('mailto:') && !href.startsWith('tel:') && !href.startsWith('javascript:')) {
                    link.removeAttribute('target');
                }
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() {
                removeAllBlankTargets();
                setTimeout(removeAllBlankTargets, 100);
                setTimeout(removeAllBlankTargets, 500);
                setTimeout(removeAllBlankTargets, 1000);
                setTimeout(removeAllBlankTargets, 2000);
            });
        } else {
            removeAllBlankTargets();
            setTimeout(removeAllBlankTargets, 100);
            setTimeout(removeAllBlankTargets, 500);
            setTimeout(removeAllBlankTargets, 1000);
            setTimeout(removeAllBlankTargets, 2000);
        }

        if (window.MutationObserver) {
            var observer = new MutationObserver(function(mutations) {
                removeAllBlankTargets();
            });
            observer.observe(document.body, { childList: true, subtree: true });
        }

        document.addEventListener('click', function(e) {
            var link = e.target.closest('a');
            if (link && link.getAttribute('target') === '_blank') {
                e.preventDefault();
                link.removeAttribute('target');
                window.location.href = link.getAttribute('href');
            }
        }, true);
    })();
    </script>

</body>
</html>
